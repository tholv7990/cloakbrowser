version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/js"
    schedule:
      interval: "weekly"
    groups:
      javascript:
        patterns:
          - "*"
